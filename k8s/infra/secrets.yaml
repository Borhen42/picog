# LOCAL / demo database credentials.
#
# These same values (root123 / admin123) already live in the committed
# Backend/*/docker-compose.yml files, so keeping them here does not leak anything
# new and lets Argo CD bring MySQL + the services up unattended.
#
# The SENSITIVE Azure AI key is deliberately NOT here — it is created out-of-band
# (see secrets.example.yaml) so it never lands in git.
apiVersion: v1
kind: Secret
metadata:
  name: medical-db-secret
  namespace: cognivita
type: Opaque
stringData:
  mysql-root-password: "root123"
---
apiVersion: v1
kind: Secret
metadata:
  name: mmse-db-secret
  namespace: cognivita
type: Opaque
stringData:
  mysql-root-password: "admin123"
