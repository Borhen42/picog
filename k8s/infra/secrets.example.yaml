# -----------------------------------------------------------------------------
# Azure AI key — create it MANUALLY, never commit the real value.
# This file is a template and is intentionally NOT referenced by kustomization.yaml,
# so Argo CD will not apply (or prune) it.
#
#   kubectl -n cognivita create secret generic medical-ai-secret \
#     --from-literal=api-key='<YOUR_ROTATED_AZURE_AI_KEY>'
#
# medical-service references this key with optional: true, so the pod starts fine
# without it — the AI summary endpoint just replies "not configured". Create the
# secret (and restart the deployment) to enable POST /api/medical-records/{id}/ai-summary.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: medical-ai-secret
  namespace: cognivita
type: Opaque
stringData:
  api-key: "REPLACE_WITH_ROTATED_AZURE_AI_KEY"
