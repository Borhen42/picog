apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mmse-mysql-pvc
  namespace: cognivita
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mmse-mysql
  namespace: cognivita
  labels:
    app: mmse-mysql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mmse-mysql
  template:
    metadata:
      labels:
        app: mmse-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mmse-db-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: mmse_db
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mmse-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mmse-mysql
  namespace: cognivita
spec:
  selector:
    app: mmse-mysql
  ports:
    - port: 3306
      targetPort: 3306
