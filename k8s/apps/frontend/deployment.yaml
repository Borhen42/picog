apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cognivita
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: cognivita-frontend       # nginx serving the Angular build + /api proxy
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cognivita
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
# Browse the app at http://cognivita.local:30080 (ingress-nginx NodePort).
# The frontend's nginx reverse-proxies /api to the api-gateway Service, so the
# browser only ever talks to this one origin (no CORS, no per-service ports).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cognivita
  namespace: cognivita
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: nginx
  rules:
    - host: cognivita.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
