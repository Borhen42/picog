# Wave 0 — namespace, DB secrets, MySQL. Comes up before the services.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cognivita-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cognivita
  source:
    repoURL: https://github.com/Borhen42/pi-cognitive.git
    targetRevision: main
    path: k8s/infra
  destination:
    server: https://kubernetes.default.svc
    namespace: cognivita
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
