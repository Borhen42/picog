# Wave 2 — needs medical-mysql (infra, wave 0) + Eureka (wave 1).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medical-service
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cognivita
  source:
    repoURL: https://github.com/Borhen42/picog.git
    targetRevision: main
    path: k8s/apps/medical-service
  destination:
    server: https://kubernetes.default.svc
    namespace: cognivita
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
