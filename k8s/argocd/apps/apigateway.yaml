# Wave 2 — gateway + domain services (register with Eureka; retry until it's up).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cognivita
  source:
    repoURL: https://github.com/Borhen42/picog.git
    targetRevision: main
    path: k8s/apps/apigateway
  destination:
    server: https://kubernetes.default.svc
    namespace: cognivita
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
