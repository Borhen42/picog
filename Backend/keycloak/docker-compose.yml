services:
  keycloak:
    image: keycloak/keycloak:latest
    container_name: keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: start-dev
    ports:
      - "8082:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - shared_network

volumes:
  keycloak_data:

networks:
  shared_network:
    external: true
