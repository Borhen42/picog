spring.application.name=medical-service
server.port=8083
eureka.client.service-url.defaultZone=http://localhost:8080/eureka/
# Do not fail startup if Eureka is not available
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# --- MySQL (required) ---
# Medical service needs MySQL on 127.0.0.1:3306. If nothing listens, you get:
#   Communications link failure / Connection refused
# Fix: start MySQL (XAMPP/WAMP service) OR run from repo root: docker compose up -d
# For Docker MySQL (root password root123), use profile "docker" or env MYSQL_PASSWORD=root123.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/alzheimer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Avoid misleading "Unable to determine Dialect" when JDBC is down; real error is usually connection refused.
spring.jpa.database=mysql
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Scope the startup schema scan to THIS service's own tables only.
# Hibernate's default "grouped" strategy reads metadata for EVERY table in the shared
# alzheimer_db schema, so a corrupted/orphaned table owned by another service
# (e.g. mmse_tests -> MySQL/MariaDB error 1932 "Table doesn't exist in engine") aborts
# medical-service startup with a BeanCreationException on entityManagerFactory.
# "individually" makes Hibernate inspect only medical_records.
spring.jpa.properties.hibernate.hbm2ddl.jdbc_metadata_extraction_strategy=individually
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- Azure AI Foundry (OpenAI-compatible) for AI patient-case summaries ---
# Endpoint + deployment come from the Azure AI Foundry project. The API key is read from the
# AZURE_AI_API_KEY environment variable so it is never committed to source control.
# When the key is missing, POST /api/medical-records/{id}/ai-summary returns a clear
# "not configured" message instead of failing.
azure.ai.endpoint=https://ilyeszaidi4532-resource.services.ai.azure.com/openai/v1
azure.ai.deployment=Kimi-K2.6
azure.ai.api-key=${AZURE_AI_API_KEY:}
# Base URL of mmse-service, used (best-effort) to enrich the summary with cognitive test scores.
mmse.service.url=http://localhost:8085
