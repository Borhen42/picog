# SonarQube config for the Angular frontend. Read by sonarsource/sonarqube-scan-action
# (projectBaseDir: frontend). SONAR_HOST_URL and SONAR_TOKEN come from the workflow env.
sonar.projectKey=cognivita-frontend
sonar.projectName=cognivita-frontend

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/*.spec.ts,src/assets/**,**/*.d.ts
sonar.sourceEncoding=UTF-8

# Coverage produced by `npm test` (Angular unit-test builder -> vitest v8 -> lcovonly).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Report-only for now. The Vitest suite currently fails to COMPILE (e.g. app.spec.ts imports
# a non-existent `App`; prediction.service.spec.ts uses the removed done() callback), so no
# coverage is produced and an enforced gate would fail CI every time. Analysis still runs and
# uploads (bugs, code smells, vulnerabilities, security hotspots, duplications). Flip to `true`
# once the suite compiles and coverage flows to frontend/coverage/lcov.info. Backend stays
# enforced. See k8s/arc/README.md.
sonar.qualitygate.wait=false
