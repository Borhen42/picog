server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy the medical-domain API to the Spring Cloud Gateway so the browser
  # talks to the frontend origin only (no CORS). "api-gateway" resolves to the
  # api-gateway Service in Kubernetes and to the api-gateway container under
  # docker-compose (both share a network). The gateway then load-balances via Eureka.
  location /api/ {
    proxy_pass http://api-gateway:8093;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Angular is a single-page app: every unknown path must fall back to index.html
  # so the client-side router (and the Keycloak redirect URIs) resolve correctly.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache the hashed build assets.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Never cache the SSO helper or the entry document.
  location = /assets/silent-check-sso.html {
    add_header Cache-Control "no-store";
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
