name: CI · mmse-service

on:
  push:
    branches: [main]
    paths:
      - "Backend/mmse-service/**"
      - ".github/workflows/ci-mmse-service.yml"
      - ".github/workflows/_reusable-backend.yml"
  pull_request:
    paths:
      - "Backend/mmse-service/**"
  workflow_dispatch:

concurrency:
  group: ci-mmse-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_reusable-backend.yml
    with:
      service_dir: mmse-service
      image_name: mmse-service
      manifest_dir: k8s/apps/mmse-service
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
