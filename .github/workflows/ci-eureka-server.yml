name: CI · eureka-server

on:
  push:
    branches: [main]
    paths:
      - "Backend/eureka-server/**"
      - ".github/workflows/ci-eureka-server.yml"
      - ".github/workflows/_reusable-backend.yml"
  pull_request:
    paths:
      - "Backend/eureka-server/**"
  workflow_dispatch:

concurrency:
  group: ci-eureka-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_reusable-backend.yml
    with:
      service_dir: eureka-server
      image_name: eureka-server
      manifest_dir: k8s/apps/eureka-server
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
