name: CI · frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
  workflow_dispatch:

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    # GitHub-hosted runner. Sonar analysis now targets SonarQube Cloud (sonarcloud.io), so CI no
    # longer needs to run inside the WSL cluster; the runner provides Docker for the image build.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Vitest runs once (non-TTY). Kept non-blocking until the Angular 21 test
      # suite is stabilized — the production build below is the hard gate. Coverage is
      # emitted to frontend/coverage/lcov.info (angular.json test builder -> lcovonly) for Sonar.
      - name: Unit tests (+ coverage)
        working-directory: frontend
        continue-on-error: true
        env:
          CI: "true"
        run: npm test

      # SonarQube Cloud analysis + quality gate. Config (organization, projectKey, sources,
      # lcov path, qualitygate.wait) lives in frontend/sonar-project.properties. The SONAR_TOKEN
      # secret now holds a Sonar Cloud token.
      - name: SonarQube analysis
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: frontend

      - name: Compute image tag (short SHA)
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # The multi-stage Dockerfile runs `npm ci && npm run build`, so this step is
      # also the production build gate: a broken build fails the pipeline here.
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cognivita-frontend:${{ steps.meta.outputs.tag }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cognivita-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump image tag in GitOps manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          KFILE="k8s/apps/frontend/kustomization.yaml"
          yq -i "(.images[] | select(.name == \"cognivita-frontend\")).newName = \"docker.io/${DOCKERHUB_USERNAME}/cognivita-frontend\"" "$KFILE"
          yq -i "(.images[] | select(.name == \"cognivita-frontend\")).newTag  = \"${TAG}\"" "$KFILE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KFILE"
          if git diff --cached --quiet; then
            echo "Manifest already up to date."; exit 0
          fi
          git commit -m "ci(frontend): deploy ${TAG} [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Pushed manifest bump."; exit 0
            fi
            echo "push race — retry ${attempt}"; sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push manifest bump after retries"; exit 1
