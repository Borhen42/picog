# Reusable CI pipeline shared by the four Spring Boot services (eureka-server,
# apiGateway, medical-service, mmse-service). It builds + tests with the service's
# own Maven wrapper, builds a Docker image, pushes it to Docker Hub tagged with the
# short commit SHA, and then bumps that tag in the service's kustomize manifest so
# Argo CD (GitOps) rolls it out. See k8s/README.md for the end-to-end flow.
# UPDATE !! access write granted in github.com to actions
name: reusable-backend

on:
  workflow_call:
    inputs:
      service_dir:
        description: Folder under Backend/ (e.g. medical-service)
        required: true
        type: string
      image_name:
        description: Docker Hub repository name (e.g. medical-service)
        required: true
        type: string
      manifest_dir:
        description: kustomize app dir whose image tag CI bumps (e.g. k8s/apps/medical-service)
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true

jobs:
  build-test-deploy:
    # GitHub-hosted runners. CI now analyzes against SonarQube Cloud (sonarcloud.io) instead of
    # the in-cluster SonarQube, so jobs no longer need to run inside the WSL cluster.
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push the image-tag bump back to main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build & test (Maven wrapper)
        working-directory: Backend/${{ inputs.service_dir }}
        run: |
          chmod +x mvnw
          ./mvnw -B --no-transfer-progress verify

      # SonarQube Cloud analysis + quality gate. Reuses the target/ produced by `verify` above
      # (compiled classes, surefire reports, jacoco.xml) in the same workspace. The fully
      # qualified plugin coordinate avoids needing a plugin-prefix in each pom. Cloud requires
      # sonar.organization alongside the token; the SONAR_TOKEN secret now holds a Sonar Cloud
      # token. `sonar.qualitygate.wait=true` fails the job on a RED gate.
      - name: SonarQube analysis
        working-directory: Backend/${{ inputs.service_dir }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: |
          ./mvnw -B --no-transfer-progress \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.organization=borhen42 \
            -Dsonar.projectKey=borhen42 \
            -Dsonar.projectName="mesaoudiborhen" \
            -Dsonar.qualitygate.wait=true

      - name: Compute image tag (short SHA)
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: Backend/${{ inputs.service_dir }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:${{ steps.meta.outputs.tag }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps: point the manifest at the freshly-pushed tag. Only on pushes to main
      # (not PRs). The commit touches k8s/** only, so it never re-triggers this workflow
      # (paths are scoped to Backend/**); [skip ci] is belt-and-suspenders.
      - name: Bump image tag in GitOps manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: ${{ inputs.image_name }}
          MANIFEST_DIR: ${{ inputs.manifest_dir }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          KFILE="${MANIFEST_DIR}/kustomization.yaml"
          yq -i "(.images[] | select(.name == \"${IMAGE_NAME}\")).newName = \"docker.io/${DOCKERHUB_USERNAME}/${IMAGE_NAME}\"" "$KFILE"
          yq -i "(.images[] | select(.name == \"${IMAGE_NAME}\")).newTag  = \"${TAG}\"" "$KFILE"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KFILE"
          if git diff --cached --quiet; then
            echo "Manifest already up to date."; exit 0
          fi
          git commit -m "ci(${IMAGE_NAME}): deploy ${TAG} [skip ci]"
          # Other services may push concurrently; rebase-and-retry to avoid non-fast-forward.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Pushed manifest bump."; exit 0
            fi
            echo "push race — retry ${attempt}"; sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push manifest bump after retries"; exit 1
