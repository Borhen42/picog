name: CI · medical-service

on:
  push:
    branches: [main]
    paths:
      - "Backend/medical-service/**"
      - ".github/workflows/ci-medical-service.yml"
      - ".github/workflows/_reusable-backend.yml"
  pull_request:
    paths:
      - "Backend/medical-service/**"
  workflow_dispatch:

concurrency:
  group: ci-medical-service-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/_reusable-backend.yml
    with:
      service_dir: medical-service
      image_name: medical-service
      manifest_dir: k8s/apps/medical-service
      project_key: cognivita-medical-service
      project_name: cognivita-medical-service
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
